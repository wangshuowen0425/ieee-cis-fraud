random_seed: 42

models:
  - dummy
  - logistic_regression
  - lightgbm

primary_metric: pr_auc

additional_metrics:
  - roc_auc
  - precision
  - recall
  - f1
  - mcc
  - accuracy

positive_label: 1

feature_groups:
  - transaction_basic
  - transaction_identity
  - transaction_identity_missing

fallback_model: hist_gradient_boosting

model_params:
  dummy:
    strategy: most_frequent
  logistic_regression:
    max_iter: 1000
    solver: lbfgs
    class_weight: balanced
  lightgbm:
    n_estimators: 100
    learning_rate: 0.05
    num_leaves: 31
    n_jobs: -1
  hist_gradient_boosting:
    max_iter: 100
    learning_rate: 0.05
