random_seed: 42
default_threshold: 0.5
primary_metric: pr_auc

threshold_optimization:
  enabled: true
  selection_split: validation
  minimum_threshold: 0.05
  maximum_threshold: 0.95
  threshold_step: 0.01
  false_negative_cost: 10
  false_positive_cost: 1
  tie_breaker:
    - recall
    - precision
    - closest_to_0_5

models:
  dummy:
    strategy: prior
  logistic_regression:
    class_weight: balanced
    solver: saga
    max_iter: 200
    n_jobs: -1
  lightgbm:
    enabled: true
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    n_jobs: -1
  hist_gradient_boosting:
    enabled: true
    max_iter: 150
    learning_rate: 0.05
    max_leaf_nodes: 31
    early_stopping: true
  random_forest:
    enabled: true
    n_estimators: 150
    max_depth: 12
    min_samples_leaf: 20
    class_weight: balanced_subsample
    n_jobs: -1

fallback_model: hist_gradient_boosting
tree_model_fallback_order:
  - lightgbm
  - hist_gradient_boosting
  - random_forest

preprocessing:
  numeric_imputer: median
  categorical_imputer: constant
  categorical_fill_value: "__MISSING__"
  tree_categorical_fill_value: "**MISSING**"
  one_hot_handle_unknown: ignore
  one_hot_min_frequency: 20
  one_hot_max_categories: 100
  scale_numeric_for_logistic: true

metrics:
  - pr_auc
  - roc_auc
  - precision
  - recall
  - f1
  - mcc
  - accuracy

additional_metrics:
  - roc_auc
  - precision
  - recall
  - f1
  - mcc
  - accuracy

positive_label: 1

feature_groups:
  - transaction_basic
  - transaction_identity
  - transaction_identity_missing
